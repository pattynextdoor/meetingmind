        <h1>MeetingMind — Meeting transcripts that actually connect</h1>
        <p>MeetingMind is an Obsidian plugin that transforms meeting transcripts into connected knowledge inside your vault.</p>
        
        <h2>Features (Free)</h2>
        <ul>
          <li>Import transcripts from Zoom, Google Meet, Microsoft Teams, Fireflies, Otter.ai, or any VTT/SRT/TXT file</li>
          <li>Auto-link participants, topics, and projects to existing Obsidian notes</li>
          <li>Folder watcher for automatic transcript import</li>
          <li>Participant tracking across meetings</li>
          <li>Meeting dashboard with Dataview integration</li>
          <li>Alias matching — nicknames resolve to full note names</li>
        </ul>

        <h2>Pro Features ($39 one-time, BYOK)</h2>
        <ul>
          <li>AI-powered meeting summaries that scale with meeting length</li>
          <li>Action item extraction with assignees and due dates</li>
          <li>Decision extraction</li>
          <li>Entity extraction (issues, updates, topics)</li>
          <li>Participant insights (roles, contributions, wins)</li>
          <li>Smart tag suggestions from your existing vault tags</li>
          <li>Uses your own OpenAI or Claude API key — data never touches our servers</li>
        </ul>

        <h2>How it works</h2>
        <p>Import any meeting transcript and MeetingMind automatically parses participants, timestamps, and content. It scans your vault for matching notes and creates wikilinks — "the enrollment API" links to [[Enrollment API]], "Patty" matches [[Patrick Tumbucon]] via alias. Pro users get AI summaries, action items, and decisions using their own API keys.</p>

        <h2>Integrations</h2>
        <p>Fireflies.ai (automatic sync), Otter.ai (export import), Zoom (VTT transcripts), Google Meet (Workspace transcripts), Microsoft Teams (.docx/.vtt export), and any plain text transcript file.</p>
